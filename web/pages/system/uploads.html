<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理 - Gai Admin</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="layui-layout-body">
    <div class="layui-layout layui-layout-admin">
        <div class="layui-header">
            <div class="layui-logo"><div class="logo-icon"><i class="layui-icon layui-icon-home"></i></div><span>Gai Admin</span></div>
            <ul class="layui-nav top-menu">
                <li class="layui-nav-item"><a href="/pages/dashboard/index.html"><i class="layui-icon layui-icon-chart"></i><cite>数据看板</cite></a></li>
                <li class="layui-nav-item layui-this"><a href="/pages/system/users.html"><i class="layui-icon layui-icon-set"></i><cite>系统管理</cite></a></li>
                <li class="layui-nav-item"><a href="/pages/data/export.html"><i class="layui-icon layui-icon-table"></i><cite>数据管理</cite></a></li>
                <li class="layui-nav-item"><a href="/pages/logs/operation.html"><i class="layui-icon layui-icon-log"></i><cite>日志管理</cite></a></li>
            </ul>
            <ul class="layui-nav layui-layout-right">
                <li style="line-height:56px;padding-right:8px;">
                    <a class="theme-toggle" id="theme-toggle" href="javascript:;" title="切换主题">
                        <i class="layui-icon layui-icon-moon"></i>
                    </a>
                </li>
                <li class="layui-nav-item"><a href="javascript:;"><img src="https://gw.alipayobjects.com/zos/rmsportal/BiazfanxmamNRoxxVxko.png" class="layui-nav-img"><span id="username">Admin</span></a>
                    <dl class="layui-nav-child"><dd><a href="javascript:;" id="btn-logout" style="color:#ff4d4f;">退出登录</a></dd></dl>
                </li>
            </ul>
        </div>
        <div class="layui-side layui-side-menu">
            <div class="layui-side-scroll">
                <ul class="sidebar-menu">
                    <li class="sidebar-menu-item"><a href="/pages/system/users.html"><i class="layui-icon layui-icon-username"></i> 用户管理</a></li>
                    <li class="sidebar-menu-item"><a href="/pages/system/roles.html"><i class="layui-icon layui-icon-group"></i> 角色管理</a></li>
                    <li class="sidebar-menu-item"><a href="/pages/system/menus.html"><i class="layui-icon layui-icon-menu-fill"></i> 菜单管理</a></li>
                    <li class="sidebar-menu-item"><a href="/pages/system/permissions.html"><i class="layui-icon layui-icon-auz"></i> 权限管理</a></li>
                    <li class="sidebar-menu-item active"><a href="/pages/system/uploads.html"><i class="layui-icon layui-icon-picture"></i> 文件管理</a></li>
                    <li class="sidebar-menu-item"><a href="/pages/system/tasks.html"><i class="layui-icon layui-icon-time"></i> 定时任务</a></li>
                    <li class="sidebar-menu-item"><a href="/pages/system/settings.html"><i class="layui-icon layui-icon-set"></i> 系统设置</a></li>
                </ul>
            </div>
        </div>
        <div class="layui-body">
            <div class="layui-fluid">
                <div class="search-bar">
                    <div class="layui-form layui-inline">
                        <div class="layui-inline"><button class="layui-btn layui-btn-normal" id="btn-upload"><i class="layui-icon layui-icon-upload"></i> 上传文件</button></div>
                    </div>
                </div>
                <div class="admin-card"><table class="layui-hide" id="data-table" lay-filter="data-table"></table></div>
            </div>
        </div>
    </div>

    <script type="text/html" id="toolbar-tpl">
        <a class="layui-btn layui-btn-xs" lay-event="preview">预览</a>
        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
    </script>

    <script src="/layui/layui.js"></script>
    <script src="/js/common.js"></script>
    <script>
    layui.use(['element', 'layer', 'table', 'upload'], function(){
        var table = layui.table, layer = layui.layer, upload = layui.upload;
        if (!checkAuth()) return;
        loadCurrentUser();

        table.render({
            elem: '#data-table',
            url: API_BASE + '/uploads',
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
            page: true,
            limit: 20,
            cols: [[
                { field: 'id', title: 'ID', width: 60 },
                { field: 'original_name', title: '文件名', minWidth: 200 },
                { field: 'file_size', title: '大小', width: 100, templet: function(d){ return formatFileSize(d.file_size); } },
                { field: 'mime_type', title: '类型', width: 120 },
                { field: 'created_at', title: '上传时间', width: 160 },
                { title: '操作', width: 120, toolbar: '#toolbar-tpl' }
            ]],
            parseData: function(res){ return { code: res.code === 0 ? 0 : res.code, msg: res.message, count: res.data ? res.data.total : 0, data: res.data ? (res.data.items || res.data.list || []) : [] }; }
        });

        // 上传文件
        document.getElementById('btn-upload').addEventListener('click', function(){
            var html = '<div style="padding:20px;">';
            html += '<div class="layui-upload-drag" id="upload-area" style="padding:40px;text-align:center;border:2px dashed #e6e6e6;border-radius:4px;cursor:pointer;">';
            html += '<i class="layui-icon layui-icon-upload" style="font-size:48px;color:#c0c0c0;"></i>';
            html += '<p style="margin-top:10px;color:#999;">点击或拖拽文件到此处上传</p>';
            html += '</div><div id="upload-status" style="margin-top:16px;"></div></div>';

            layer.open({
                type: 1, title: '上传文件', area: ['500px', '300px'], content: html,
                success: function(){
                    upload.render({
                        elem: '#upload-area',
                        url: API_BASE + '/uploads',
                        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                        accept: 'file',
                        before: function(){ document.getElementById('upload-status').innerHTML = '<span style="color:#1890ff;">上传中...</span>'; },
                        done: function(res){
                            if (res.code === 0) {
                                document.getElementById('upload-status').innerHTML = '<span style="color:#52c41a;">上传成功</span>';
                                setTimeout(function(){ layer.closeAll(); table.reload('data-table'); }, 1000);
                            } else {
                                document.getElementById('upload-status').innerHTML = '<span style="color:#ff4d4f;">' + esc(res.message || '上传失败') + '</span>';
                            }
                        },
                        error: function(){ document.getElementById('upload-status').innerHTML = '<span style="color:#ff4d4f;">上传失败</span>'; }
                    });
                }
            });
        });

        table.on('tool(data-table)', function(obj){
            var data = obj.data;
            if (obj.event === 'preview') {
                if (data.mime_type && data.mime_type.startsWith('image/')) {
                    layer.open({ type: 1, title: '图片预览', area: ['600px', '450px'], content: '<div style="padding:20px;text-align:center;"><img src="' + data.url + '" style="max-width:100%;max-height:380px;"></div>' });
                } else {
                    window.open(data.url, '_blank');
                }
            } else if (obj.event === 'del') {
                layer.confirm('确定删除该文件？', function(idx){
                    request('/uploads/' + data.id, { method: 'DELETE' }).then(function(res){
                        if (res.code === 0) { showSuccess('删除成功'); obj.del(); } else { showError(res.message); }
                        layer.close(idx);
                    });
                });
            }
        });

        // 主题切换
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        if (document.documentElement.classList.contains('dark-mode')) {
            document.getElementById('theme-toggle').innerHTML = '<i class="layui-icon layui-icon-light"></i>';
        }

        document.getElementById('btn-logout').addEventListener('click', function(){
            layer.confirm('确定退出登录？', function(idx){ localStorage.removeItem('token'); window.location.href = '/login'; });
        });
    });
    </script>
</body>
</html>
