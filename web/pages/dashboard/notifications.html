<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的通知 - Gai Admin</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="layui-layout-body">
    <div class="layui-layout layui-layout-admin">
        <div class="layui-header">
            <div class="layui-logo"><div class="logo-icon"><i class="layui-icon layui-icon-home"></i></div><span>Gai Admin</span></div>
            <ul class="layui-nav top-menu">
                <li class="layui-nav-item layui-this"><a href="/pages/dashboard/index.html"><i class="layui-icon layui-icon-chart"></i><cite>数据看板</cite></a></li>
                <li class="layui-nav-item"><a href="/pages/system/users.html"><i class="layui-icon layui-icon-set"></i><cite>系统管理</cite></a></li>
                <li class="layui-nav-item"><a href="/pages/data/export.html"><i class="layui-icon layui-icon-table"></i><cite>数据管理</cite></a></li>
                <li class="layui-nav-item"><a href="/pages/logs/operation.html"><i class="layui-icon layui-icon-log"></i><cite>日志管理</cite></a></li>
            </ul>
            <ul class="layui-nav layui-layout-right">
                <li style="line-height:56px;padding-right:8px;">
                    <a class="theme-toggle" id="theme-toggle" href="javascript:;" title="切换主题">
                        <i class="layui-icon layui-icon-moon"></i>
                    </a>
                </li>
                <li class="layui-nav-item"><a href="javascript:;"><img src="https://gw.alipayobjects.com/zos/rmsportal/BiazfanxmamNRoxxVxko.png" class="layui-nav-img"><span id="username">Admin</span></a>
                    <dl class="layui-nav-child"><dd><a href="javascript:;" id="btn-logout" style="color:#ff4d4f;">退出登录</a></dd></dl>
                </li>
            </ul>
        </div>
        <div class="layui-side layui-side-menu">
            <div class="layui-side-scroll">
                <ul class="sidebar-menu">
                    <li class="sidebar-menu-item"><a href="/pages/dashboard/index.html"><i class="layui-icon layui-icon-chart"></i> 首页概览</a></li>
                    <li class="sidebar-menu-item active"><a href="/pages/dashboard/notifications.html"><i class="layui-icon layui-icon-notice"></i> 我的通知</a></li>
                </ul>
            </div>
        </div>
        <div class="layui-body">
            <div class="layui-fluid">
                <div class="search-bar">
                    <div class="layui-form layui-inline">
                        <div class="layui-inline"><button class="layui-btn layui-btn-normal" id="btn-read-all"><i class="layui-icon layui-icon-ok"></i> 全部已读</button></div>
                    </div>
                </div>
                <div class="admin-card"><table class="layui-hide" id="data-table" lay-filter="data-table"></table></div>
            </div>
        </div>
    </div>

    <script type="text/html" id="read-tpl">
        {{# if(d.is_read){ }}
        <span class="layui-badge layui-bg-gray">已读</span>
        {{# } else { }}
        <span class="layui-badge layui-bg-blue">未读</span>
        {{# } }}
    </script>
    <script type="text/html" id="toolbar-tpl">
        {{# if(!d.is_read){ }}
        <a class="layui-btn layui-btn-xs" lay-event="read">标记已读</a>
        {{# } }}
        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
    </script>

    <script src="/layui/layui.js"></script>
    <script src="/js/common.js"></script>
    <script>
    layui.use(['element', 'layer', 'table'], function(){
        var table = layui.table, layer = layui.layer;
        if (!checkAuth()) return;
        loadCurrentUser();

        table.render({
            elem: '#data-table',
            url: API_BASE + '/notifications',
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
            page: true,
            limit: 20,
            cols: [[
                { field: 'id', title: 'ID', width: 60 },
                { field: 'title', title: '标题', minWidth: 150 },
                { field: 'content', title: '内容', minWidth: 200 },
                { field: 'is_read', title: '状态', width: 80, templet: '#read-tpl' },
                { field: 'created_at', title: '时间', width: 160 },
                { title: '操作', width: 120, toolbar: '#toolbar-tpl' }
            ]],
            parseData: function(res){ return { code: res.code === 0 ? 0 : res.code, msg: res.message, count: res.data ? res.data.total : 0, data: res.data ? (res.data.items || res.data.list || []) : [] }; }
        });

        document.getElementById('btn-read-all').addEventListener('click', function(){
            request('/notifications/mark-all-read', { method: 'PUT' }).then(function(res){
                if (res.code === 0) { showSuccess('操作成功'); table.reload('data-table'); } else { showError(res.message); }
            });
        });

        table.on('tool(data-table)', function(obj){
            var data = obj.data;
            if (obj.event === 'read') {
                request('/notifications/mark-read/' + data.id, { method: 'PUT' }).then(function(res){
                    if (res.code === 0) { showSuccess('已标记为已读'); table.reload('data-table'); } else { showError(res.message); }
                });
            } else if (obj.event === 'del') {
                layer.confirm('确定删除该通知？', function(idx){
                    request('/notifications/' + data.id, { method: 'DELETE' }).then(function(res){
                        if (res.code === 0) { showSuccess('删除成功'); obj.del(); } else { showError(res.message); }
                        layer.close(idx);
                    });
                });
            }
        });

        // 主题切换
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        if (document.documentElement.classList.contains('dark-mode')) {
            document.getElementById('theme-toggle').innerHTML = '<i class="layui-icon layui-icon-light"></i>';
        }

        document.getElementById('btn-logout').addEventListener('click', function(){
            layer.confirm('确定退出登录？', function(idx){ localStorage.removeItem('token'); window.location.href = '/login'; });
        });
    });
    </script>
</body>
</html>
