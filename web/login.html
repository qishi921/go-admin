<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Gai Admin</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            width: 400px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-title { text-align: center; margin-bottom: 30px; }
        .login-title h1 { font-size: 28px; color: #333; margin-bottom: 8px; }
        .login-title p { color: #999; font-size: 14px; }
        .layui-form-item { margin-bottom: 20px; }
        .layui-input {
            height: 44px;
            line-height: 44px;
            border-radius: 6px;
            border-color: #d9d9d9;
        }
        .layui-input:focus {
            border-color: #1890ff !important;
            box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
        }
        .layui-btn {
            height: 44px;
            line-height: 44px;
            border-radius: 6px;
            font-size: 16px;
        }
        .layui-btn-normal {
            background: linear-gradient(135deg, #1890ff, #096dd9);
            border: none;
        }
        .layui-btn-normal:hover {
            background: linear-gradient(135deg, #40a9ff, #1890ff);
        }
        .login-tips {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-title">
            <h1>后台管理系统</h1>
            <p>Gai Framework Admin System</p>
        </div>
        <form class="layui-form" onsubmit="return false;">
            <div class="layui-form-item">
                <input type="text" id="username" placeholder="用户名" class="layui-input" autocomplete="username">
            </div>
            <div class="layui-form-item">
                <input type="password" id="password" placeholder="密码" class="layui-input" autocomplete="current-password">
            </div>
            <div class="layui-form-item">
                <button class="layui-btn layui-btn-normal" style="width: 100%;" id="btn-login">登 录</button>
            </div>
        </form>
        <div class="login-tips">默认账号: admin / admin123</div>
    </div>

    <script src="/layui/layui.js"></script>
    <script>
    const API_BASE = '/api/v1';

    // 检查是否已登录
    if (localStorage.getItem('token')) {
        window.location.href = '/pages/dashboard/index.html';
    }

    document.getElementById('btn-login').addEventListener('click', async function() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            layui.layer.msg('请输入用户名和密码', {icon: 2});
            return;
        }

        this.disabled = true;
        this.textContent = '登录中...';

        try {
            const response = await fetch(API_BASE + '/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (data.code === 0 && data.data && data.data.token) {
                localStorage.setItem('token', data.data.token);
                if (data.data.user) {
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                }
                layui.layer.msg('登录成功', {icon: 1});
                setTimeout(() => {
                    window.location.href = '/pages/dashboard/index.html';
                }, 500);
            } else {
                layui.layer.msg(data.message || '登录失败', {icon: 2});
                this.disabled = false;
                this.textContent = '登 录';
            }
        } catch (error) {
            layui.layer.msg('网络错误', {icon: 2});
            this.disabled = false;
            this.textContent = '登 录';
        }
    });

    // 回车登录
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('btn-login').click();
        }
    });
    </script>
</body>
</html>
