# Air 配置文件 - Go 热重载开发工具
# https://github.com/cosmtrek/air

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
# 要编译的主文件
cmd = "go build -o ./tmp/main ."
# 运行的二进制文件
bin = "tmp/main"
# 要监听的文件后缀
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "json"]
# 排除的目录
exclude_dir = ["assets", "tmp", "vendor", "web/layui", "node_modules"]
# 排除的文件
exclude_file = []
# 排除的正则（不监听）
exclude_regex = ["_test.go"]
# 排除不变的目录
exclude_unchanged = true
# 监听的根目录，使用当前目录
include_dir = []
# 同时监听以下目录
include_file = ["config/app.yaml", ".env"]
# 延迟触发构建（毫秒）
delay = 1000
# 发生错误时停止运行
stop_on_error = true
# 日志输出目录
log = "tmp/air.log"
# 轮询监听（某些系统不支持 fsnotify）
poll = false
# 轮询间隔
poll_interval = 500

[log]
# 显示日志时间
time = true
# 只显示主日志
main_only = false

[color]
# 自定义颜色
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# 退出时清理临时目录
clean_on_exit = true

[screen]
# 清屏
clear_on_rebuild = true
# 保持滚动
keep_scroll = true
