model: Menu
table: menus
fields:
  - name: name
    type: string
    size: 50
    rules: required|min:2|max:50
  - name: path
    type: string
    size: 100
    rules: required
  - name: icon
    type: string
    size: 50
    nullable: true
  - name: component
    type: string
    size: 100
    nullable: true
  - name: sort_order
    type: int
    default: "0"
  - name: parent_id
    type: int
    nullable: true
  - name: status
    type: enum
    values: [active, inactive]
    default: "'active'"

api:
  prefix: /api/v1/menus
  actions: [index, show, store, update, destroy]
  auth: jwt
